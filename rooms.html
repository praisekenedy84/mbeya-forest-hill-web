<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rooms &amp; Suites — Mbeya Forest Hill Motel</title>
<script>window.CARMELINA_SEO={title:'Rooms & Suites — Mbeya Forest Hill Motel',description:'Browse rooms at Mbeya Forest Hill Motel — VIP Suite, Family Room with Balcony, Standard Premium, Standard Room, and Junior Bedroom. Air-conditioned rooms with WiFi from 30,000 TZS per night.',path:'rooms.html',image:'./assets/images/gallery/rooms-suite-bed.jpg',breadcrumb:[{name:'Home',path:'index.html'},{name:'Rooms',path:'rooms.html'}]};</script>
<script src="assets/seo.js"></script>
<link rel="stylesheet" href="assets/site.css">
<style>
.rooms-layout{ display:grid; grid-template-columns:320px 1fr; gap:clamp(28px,3.5vw,56px); align-items:start; }
.side{ display:flex; flex-direction:column; gap:1.8rem; position:sticky; top:110px; }
.widget{ background:var(--paper); border:1px solid var(--line-soft); padding:1.8rem; box-shadow:var(--shadow-card); }
.widget h4{ font-family:var(--font-display); font-size:1.4rem; margin-bottom:1.2rem; padding-bottom:.9rem; border-bottom:1px solid var(--line-soft); }
.mini-field{ display:flex; flex-direction:column; gap:.3rem; margin-bottom:1rem; }
.mini-field label{ font-size:.62rem; text-transform:uppercase; letter-spacing:.18em; color:var(--ink-faint); font-weight:500; }
.mini-field input,.mini-field select{ border:1px solid var(--line); background:var(--bg); padding:.7em .8em; font-family:var(--font-sans); font-size:.92rem; color:var(--ink); outline:none; -webkit-appearance:none; appearance:none; transition:.3s; }
.mini-field input:focus,.mini-field select:focus{ border-color:var(--accent); background:var(--paper); }
.range-row{ display:flex; align-items:center; justify-content:space-between; font-size:.86rem; color:var(--ink-soft); margin-top:.4rem; }
input[type=range]{ width:100%; accent-color:var(--accent); }
.check-list{ display:flex; flex-direction:column; gap:.7rem; }
.check-list label{ display:flex; align-items:center; gap:.6em; font-size:.92rem; color:var(--ink-soft); cursor:pointer; }
.check-list input{ accent-color:var(--accent); width:16px; height:16px; }
.side-help{ background:var(--dark); color:var(--on-dark); padding:2rem; }
.side-help h4{ color:#fff; border:none; padding:0; }
.side-thumb{ display:flex; gap:1rem; padding:.7rem 0; border-bottom:1px solid var(--line-soft); }
.side-thumb:last-child{ border:none; }
.side-thumb img{ width:74px; height:64px; object-fit:cover; flex-shrink:0; }
.side-thumb .st-name{ font-family:var(--font-display); font-size:1.1rem; line-height:1.1; }
.side-thumb .st-price{ font-size:.8rem; color:var(--accent-deep); letter-spacing:.08em; }

.list-top{ display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-bottom:1.8rem; flex-wrap:wrap; }
.list-top .count{ font-size:.88rem; color:var(--ink-soft); letter-spacing:.04em; }
.sort-field{ display:flex; align-items:center; gap:.6em; font-size:.82rem; color:var(--ink-soft); }
.sort-field select{ border:1px solid var(--line); background:var(--paper); padding:.55em 1.8em .55em .8em; font-family:var(--font-sans); font-size:.85rem; color:var(--ink); outline:none; }

.room-row{ display:grid; grid-template-columns:300px 1fr; background:var(--paper); border:1px solid var(--line-soft); overflow:hidden; transition:var(--trans); box-shadow:var(--shadow-card); }
.room-row:hover{ box-shadow:var(--shadow-soft); }
.room-row .media{ position:relative; overflow:hidden; }
.room-row .media img{ width:100%; height:100%; object-fit:cover; transition:transform 1s cubic-bezier(.2,.7,.2,1); }
.room-row:hover .media img{ transform:scale(1.06); }
.room-row .price-tag{ position:absolute; top:0; left:0; background:var(--accent); color:#fff; font-size:.68rem; letter-spacing:.08em; text-transform:uppercase; padding:.65em 1em; }
.room-row .body{ padding:1.9rem; display:flex; flex-direction:column; gap:.9rem; }
.room-row h3{ font-size:1.8rem; }
.room-row h3 a:hover{ color:var(--accent-deep); }
.specs{ display:grid; grid-template-columns:1fr 1fr; gap:.5rem 1.4rem; font-size:.84rem; color:var(--ink-soft); margin:.2rem 0; }
.specs span{ display:flex; gap:.5em; }
.specs b{ color:var(--ink); font-weight:500; }
.feat-list{ display:flex; flex-wrap:wrap; gap:.5rem; list-style:none; margin:.3rem 0 .2rem; padding:0; }
.feat-list li{ font-size:.74rem; letter-spacing:.03em; color:var(--ink-soft); background:var(--bg); border:1px solid var(--line-soft); padding:.42em .85em; }
.room-row .foot{ margin-top:auto; padding-top:1rem; border-top:1px solid var(--line-soft); display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
.room-row .from{ font-family:var(--font-display); font-size:1.5rem; color:var(--ink); }
.room-row .from small{ font-size:.8rem; color:var(--ink-faint); font-family:var(--font-sans); }
.empty{ padding:3rem; text-align:center; color:var(--ink-soft); border:1px dashed var(--line); }

@media(max-width:980px){ .rooms-layout{ grid-template-columns:1fr; } .side{ position:static; } }
@media(max-width:560px){ .room-row{ grid-template-columns:1fr; } .room-row .media{ aspect-ratio:3/2; } }
</style>
</head>
<body>
<div data-site-header></div>

<section class="page-hero" data-screen-label="Rooms — Hero">
  <img class="bg" src="./assets/images/rooms-and-suites-hero.jpg" alt="Mbeya Forest Hill rooms">
  <div class="wrap">
    <span class="eyebrow light">Accommodation</span>
    <h1 class="display fw-light" style="margin-top:1rem">Rooms &amp; Suites</h1>
    <div class="breadcrumb"><a href="index.html">Home</a><span class="sep">/</span><span>Rooms</span></div>
  </div>
</section>

<section class="section">
  <div class="wrap-wide">
    <div class="rooms-layout">
      <!-- SIDEBAR -->
      <aside class="side">
        <div class="widget">
          <h4>Check Availability</h4>
          <form data-booking-form>
            <div class="mini-field"><label>Check — In</label><input type="text" data-checkin readonly></div>
            <div class="mini-field"><label>Check — Out</label><input type="text" data-checkout readonly></div>
            <div class="mini-field"><label>Guests</label><select><option>1 Guest</option><option selected>2 Guests</option><option>3 Guests</option><option>4 Guests</option></select></div>
            <button class="btn btn--accent btn--block" type="submit" style="margin-top:.4rem">Search</button>
          </form>
        </div>

        <div class="widget">
          <h4>Filter</h4>
          <div class="mini-field">
            <label>Max Price — <span id="priceOut">150,000 TZS</span></label>
            <input type="range" id="priceRange" min="30000" max="150000" step="10000" value="150000">
            <div class="range-row"><span>30,000 TZS</span><span>150,000 TZS</span></div>
          </div>
          <div class="mini-field" style="margin-top:1rem">
            <label>Beds</label>
          </div>
          <div class="check-list" id="bedFilters">
            <label><input type="checkbox" value="1" checked> 1 Bed</label>
            <label><input type="checkbox" value="2" checked> 2 Beds</label>
            <label><input type="checkbox" value="4" checked> 4 Beds</label>
          </div>
          <div class="mini-field" style="margin-top:1.4rem">
            <label>Minimum Capacity</label>
            <select id="capFilter"><option value="0">Any</option><option value="2">2+ Guests</option><option value="4">4+ Guests</option><option value="6">6+ Guests</option></select>
          </div>
        </div>

        <div class="widget">
          <h4>Popular Rooms</h4>
          <div id="popularList"></div>
        </div>

        <div class="side-help">
          <h4>Need help booking?</h4>
          <p class="muted" style="font-size:.9rem;margin:.8rem 0 1.4rem">Our reservations team is available daily to craft your perfect stay.</p>
          <a class="link-arrow" href="contact.html" style="color:var(--accent);border-color:rgba(255,255,255,.3)">Contact Us →</a>
        </div>
      </aside>

      <!-- LIST -->
      <div>
        <div class="list-top">
          <span class="count"><b id="resCount">5</b> rooms available</span>
          <div class="sort-field">
            <span>Sort by</span>
            <select id="sortSel">
              <option value="rec">Recommended</option>
              <option value="low">Price: Low to High</option>
              <option value="high">Price: High to Low</option>
              <option value="cap">Capacity: Largest</option>
            </select>
          </div>
        </div>
        <div id="roomList" style="display:flex;flex-direction:column;gap:24px"></div>
      </div>
    </div>
  </div>
</section>

<div data-site-footer></div>

<script>window.CARMELINA = { active:'rooms', transparentHeader:true };</script>
<script>
window.CARMELINA_ROOMS = [
  { slug:'vip-suite', name:'VIP Suite', price:150000, cap:4, beds:2,
    img:'./assets/images/gallery/rooms-suite-bed.jpg',
    desc:'Our finest accommodation — a spacious suite with two beds, a private meeting room, full kitchen and dining area for a complete home-away-from-home stay.',
    features:['2 Beds','Meeting Room','Private Kitchen','Dining','Wi-Fi & Fridge','TV'] },
  { slug:'family-balcony', name:'Family Room with Balcony', price:80000, cap:4, beds:2,
    img:'./assets/images/gallery/rooms-double-bed.jpg',
    desc:'A generous double bed-room ideal for families — four beds, private kitchen and dining, with a balcony to enjoy the Mbeya views.',
    features:['4 Beds','Private Kitchen','Dining','Wi-Fi & Fridge','TV'] },
  { slug:'standard-premium', name:'Standard Premium Room', price:60000, cap:2, beds:1,
    img:'./assets/images/gallery/rooms-cozy-bed.jpg',
    desc:'Premium comfort with a king-size bed, comfortable sofa, dressing table, fridge and TV.',
    features:['1 King Size Bed','Comfortable Sofa','Dressing Table','Fridge','TV'] },
  { slug:'standard-room', name:'Standard Room', price:50000, cap:2, beds:1,
    img:'./assets/images/budget-bedroom/WhatsApp%20Image%202026-05-31%20at%2004.31.40.jpeg',
    desc:'A well-appointed standard room with a single bed, comfortable sofa, dressing table, fridge and TV.',
    features:['1 Bed','Comfortable Sofa','Dressing Table','Fridge','TV'] },
  { slug:'junior-bedroom', name:'Junior Bedroom', price:30000, cap:2, beds:1,
    img:'./assets/images/gallery/rooms-twin-bed.jpg',
    desc:'Our best-value room — a simple, comfortable single bedroom with fridge and TV.',
    features:['1 Bed','Fridge','TV'] },
];
</script>
<script src="assets/site.js"></script>
<script>
(function(){
  const rooms=window.CARMELINA_ROOMS;
  const listEl=document.getElementById('roomList');
  const countEl=document.getElementById('resCount');
  const priceRange=document.getElementById('priceRange');
  const priceOut=document.getElementById('priceOut');
  const capFilter=document.getElementById('capFilter');
  const sortSel=document.getElementById('sortSel');
  const beds=document.getElementById('bedFilters');

  function fmt(n){ return n.toLocaleString('en-US'); }

  function card(r){
    return `<article class="room-row">
      <div class="media"><span class="price-tag"><b>${fmt(r.price)}</b> TZS / night</span><img src="${r.img}" alt="${r.name}"></div>
      <div class="body">
        <h3 class="display"><a href="room.html?room=${r.slug}">${r.name}</a></h3>
        <p class="muted" style="font-size:.92rem">${r.desc}</p>
        <div class="specs">
          <span>Capacity: <b>${r.cap}</b> Guests</span>
          <span>Beds: <b>${r.beds}</b></span>
        </div>
        <ul class="feat-list">${r.features.map(f=>`<li>${f}</li>`).join('')}</ul>
        <div class="foot">
          <span class="from"><b>${fmt(r.price)}</b> TZS <small>/ night</small></span>
          <span style="display:flex;gap:.7rem">
            <a class="btn btn--outline" style="padding:.8em 1.3em" href="room.html?room=${r.slug}">Details</a>
            <a class="btn btn--accent" style="padding:.8em 1.5em" href="booking.html?room=${r.slug}">Book Room</a>
          </span>
        </div>
      </div>
    </article>`;
  }

  function activeBeds(){ return [...beds.querySelectorAll('input:checked')].map(i=>i.value); }

  function render(){
    const maxP=+priceRange.value, minCap=+capFilter.value, bedsOn=activeBeds();
    let out=rooms.filter(r=> r.price<=maxP && r.cap>=minCap && bedsOn.includes(String(r.beds)));
    const s=sortSel.value;
    if(s==='low') out.sort((a,b)=>a.price-b.price);
    else if(s==='high') out.sort((a,b)=>b.price-a.price);
    else if(s==='cap') out.sort((a,b)=>b.cap-a.cap);
    countEl.textContent=out.length;
    listEl.innerHTML = out.length ? out.map(card).join('') : '<div class="empty">No rooms match your filters. Try widening your search.</div>';
  }

  priceRange.addEventListener('input', ()=>{ priceOut.textContent=fmt(+priceRange.value)+' TZS'; render(); });
  capFilter.addEventListener('change', render);
  sortSel.addEventListener('change', render);
  beds.addEventListener('change', render);

  // popular sidebar
  document.getElementById('popularList').innerHTML = rooms.slice().sort((a,b)=>b.price-a.price).slice(0,3).map(r=>`
    <a class="side-thumb" href="room.html?room=${r.slug}">
      <img src="${r.img}" alt="${r.name}">
      <span><span class="st-name">${r.name}</span><br><span class="st-price"><b>${fmt(r.price)}</b> TZS / night</span></span>
    </a>`).join('');

  render();
})();
</script>
</body>
</html>
